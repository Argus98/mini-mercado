<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Mini Mercado</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
  <nav class="navbar navbar-dark bg-dark">
    <div class="container">
      <span class="navbar-brand">Mini Mercado</span>
      <span class="text-white">
        Carrito: <strong id="carritoCount">0</strong>
      </span>
    </div>
  </nav>

  <main class="container my-4">
    <div class="row g-3">
      <div class="col-12 col-lg-8">
        <div class="d-flex gap-2 align-items-center mb-3">
          <input id="txtBuscar" class="form-control" placeholder="Buscar producto..." />
          <button id="btnBuscar" class="btn btn-primary">Buscar</button>
        </div>
        <div id="productos" class="row g-3"></div>
      </div>

      <div class="col-12 col-lg-4">
        <div class="card shadow-sm">
          <div class="card-body">
            <h5 class="card-title">Carrito</h5>
            <div id="carrito" class="small"></div>
            <hr/>
            <div class="d-flex justify-content-between">
              <strong>Total:</strong>
              <strong>$<span id="total">0</span></strong>
            </div>
            <button id="btnComprar" class="btn btn-success w-100 mt-3">Confirmar compra</button>
            <div id="msg" class="mt-3"></div>
          </div>
        </div>

      </div>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
